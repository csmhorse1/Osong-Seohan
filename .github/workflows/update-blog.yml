name: Update Naver Blog Posts

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00) 자동 실행
    - cron: '0 22 * * *'
  workflow_dispatch: {}
  # 위 줄 덕분에 GitHub 저장소 Actions 탭에서 "Run workflow" 버튼으로 수동 실행도 가능합니다.

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 네이버 블로그 RSS 읽어오기
        run: node scripts/update-blog.js

      - name: 변경사항 있으면 자동 커밋
        run: |
          git config user.name "osong-blog-bot"
          git config user.email "actions@github.com"
          git add blog-posts.json
          if git diff --staged --quiet; then
            echo "변경된 내용 없음 - 커밋 생략"
          else
            git commit -m "chore: 네이버 블로그 최신글 자동 업데이트"
            git push
          fi
